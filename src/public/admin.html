<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bingo Admin</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --border: #2a2f3a;
    --text: #f2f3f5; --text-dim: #9aa1ae;
    --blue: #3b82f6; --green: #10b981; --red: #ef4444; --gold: #f59e0b;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system, system-ui, sans-serif; background:var(--bg); color:var(--text); }
  button {
    background:var(--blue); color:#fff; border:none; border-radius:8px; padding:8px 14px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  button.ghost { background:var(--panel-2); color:var(--text); border:1px solid var(--border); }
  button.danger { background:var(--red); }
  button.success { background:var(--green); }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  input, select {
    background:var(--panel-2); border:1px solid var(--border); border-radius:8px; color:var(--text);
    padding:8px 10px; font-size:13px;
  }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); }
  th { color:var(--text-dim); font-weight:600; font-size:11px; text-transform:uppercase; }
  .badge { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge.WAITING { background:#3b82f633; color:#93c5fd; }
  .badge.STARTING { background:#f59e0b33; color:#fcd34d; }
  .badge.PLAYING { background:#10b98133; color:#6ee7b7; }
  .badge.FINISHED { background:#6b728033; color:#d1d5db; }
  .badge.active { background:#10b98133; color:#6ee7b7; }
  .badge.banned { background:#ef444433; color:#fca5a5; }
  .badge.PENDING { background:#f59e0b33; color:#fcd34d; }
  .badge.APPROVED { background:#10b98133; color:#6ee7b7; }
  .badge.REJECTED { background:#ef444433; color:#fca5a5; }

  /* ---- login ---- */
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .login-box { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:32px; width:280px; text-align:center; }
  .login-box h1 { font-size:18px; margin:0 0 4px; }
  .login-box p { font-size:12px; color:var(--text-dim); margin:0 0 20px; }
  .login-box input { width:100%; margin-bottom:10px; }
  .login-box button { width:100%; }
  .login-error { color:var(--red); font-size:12px; margin-top:8px; min-height:16px; }

  /* ---- dashboard ---- */
  #dashboard { display:none; }
  header {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 20px; border-bottom:1px solid var(--border); background:var(--panel);
  }
  header h1 { font-size:16px; margin:0; }
  nav { display:flex; gap:6px; padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); }
  nav button { background:transparent; color:var(--text-dim); border-radius:8px; }
  nav button.active { background:var(--panel-2); color:var(--text); }
  .nav-badge {
    display:inline-block; background:var(--red); color:#fff; border-radius:20px;
    font-size:10px; padding:1px 6px; margin-left:4px;
  }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  .tab { display:none; flex-direction:column; gap:16px; }
  .tab.active { display:flex; }

  .cards-row { display:flex; gap:12px; flex-wrap:wrap; }
  .stat-card { flex:1; min-width:140px; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .stat-card .label { font-size:11px; color:var(--text-dim); }
  .stat-card .value { font-size:22px; font-weight:700; margin-top:4px; }

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .panel h2 { font-size:14px; margin:0 0 12px; }
  .toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
  .toolbar input { flex:1; min-width:160px; }

  .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .row-actions button { padding:5px 9px; font-size:11px; }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
    align-items:center; justify-content:center; z-index:100;
  }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; width:320px; }
  .modal h3 { margin:0 0 12px; font-size:15px; }
  .modal .field { margin-bottom:10px; }
  .modal .field label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px; }
  .modal .field input, .modal .field select { width:100%; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

  .empty { color:var(--text-dim); font-size:12px; padding:16px; text-align:center; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🎱 Bingo Admin</h1>
    <p>Sign in to manage rooms, players, and finances</p>
    <input id="loginUsername" placeholder="Username" autocomplete="username" />
    <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="loginBtn">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h1>🎱 Bingo Admin</h1>
    <button class="ghost" id="logoutBtn">Log out</button>
  </header>
  <nav>
    <button class="nav-btn active" data-tab="overviewTab">Overview</button>
    <button class="nav-btn" data-tab="roomsTab">Rooms</button>
    <button class="nav-btn" data-tab="playersTab">Players</button>
    <button class="nav-btn" data-tab="withdrawalsTab">Withdrawals <span id="pendingBadge" class="nav-badge" style="display:none;"></span></button>
  </nav>

  <main>
    <!-- OVERVIEW -->
    <div class="tab active" id="overviewTab">
      <div class="cards-row" id="statCards"></div>
      <div class="panel">
        <h2>Recent winners</h2>
        <table id="recentWinnersTable">
          <thead><tr><th>Player</th><th>Room</th><th>Pattern</th><th>Prize</th><th>Commission</th><th>When</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- ROOMS -->
    <div class="tab" id="roomsTab">
      <div class="toolbar">
        <button id="newRoomBtn">+ New room</button>
        <button class="ghost" id="refreshRoomsBtn">Refresh</button>
      </div>
      <div class="panel">
        <table id="roomsTable">
          <thead><tr><th>ID</th><th>Status</th><th>Entry fee</th><th>Players</th><th>Prize pool</th><th>Speed</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- PLAYERS -->
    <div class="tab" id="playersTab">
      <div class="toolbar">
        <input id="playerSearch" placeholder="Search by username, first name, or Telegram ID" />
        <button id="playerSearchBtn">Search</button>
      </div>
      <div class="panel">
        <table id="playersTable">
          <thead><tr><th>ID</th><th>Username</th><th>Balance</th><th>W/L</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- WITHDRAWALS -->
    <div class="tab" id="withdrawalsTab">
      <div class="toolbar">
        <select id="withdrawalStatusFilter">
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
          <option value="ALL">All</option>
        </select>
        <button class="ghost" id="refreshWithdrawalsBtn">Refresh</button>
      </div>
      <div class="panel">
        <table id="withdrawalsTable">
          <thead><tr><th>ID</th><th>Player</th><th>Amount</th><th>Status</th><th>Requested</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- REJECT WITHDRAWAL MODAL -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <h3>Reject withdrawal</h3>
    <div class="field"><label>Reason (shown to the player)</label><input id="rejectReason" placeholder="e.g. name on receipt doesn't match" /></div>
    <div class="actions">
      <button class="ghost" id="rejectCancel">Cancel</button>
      <button class="danger" id="rejectConfirm">Reject</button>
    </div>
  </div>
</div>

<!-- NEW ROOM MODAL -->
<div class="modal-overlay" id="newRoomModal">
  <div class="modal">
    <h3>Create room</h3>
    <div class="field"><label>Entry fee</label><input id="nrEntryFee" type="number" value="100" min="1" /></div>
    <div class="field"><label>Max players</label><input id="nrMaxPlayers" type="number" value="20" min="2" /></div>
    <div class="field"><label>Number-call speed (ms)</label><input id="nrSpeed" type="number" value="5000" min="1000" /></div>
    <div class="field"><label><input id="nrAutoStart" type="checkbox" checked style="width:auto; margin-right:6px;" />Auto-start at 2+ players</label></div>
    <div class="actions">
      <button class="ghost" id="nrCancel">Cancel</button>
      <button id="nrCreate">Create</button>
    </div>
  </div>
</div>

<!-- ADJUST BALANCE MODAL -->
<div class="modal-overlay" id="adjustModal">
  <div class="modal">
    <h3>Adjust balance</h3>
    <p style="font-size:12px; color:var(--text-dim); margin-top:-6px;" id="adjustPlayerLabel">-</p>
    <div class="field"><label>Amount (positive to credit, negative to debit)</label><input id="adjAmount" type="number" value="0" /></div>
    <div class="field"><label>Reason</label><input id="adjReason" placeholder="e.g. support refund" /></div>
    <div class="actions">
      <button class="ghost" id="adjCancel">Cancel</button>
      <button id="adjConfirm">Apply</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api/admin';
let token = localStorage.getItem('bingo_admin_token') || null; // admin-only local storage; not used in the player mini app

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ---------------- Auth ---------------- */

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOverview();
}

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const { token: t } = await api('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    token = t;
    localStorage.setItem('bingo_admin_token', token);
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
  }
};

document.getElementById('logoutBtn').onclick = () => {
  token = null;
  localStorage.removeItem('bingo_admin_token');
  showLogin();
};

/* ---------------- Nav ---------------- */

document.querySelectorAll('.nav-btn').forEach((btn) => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach((b) => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'roomsTab') loadRooms();
    if (btn.dataset.tab === 'playersTab') loadPlayers();
    if (btn.dataset.tab === 'withdrawalsTab') loadWithdrawals();
    if (btn.dataset.tab === 'overviewTab') loadOverview();
  };
});

/* ---------------- Overview ---------------- */

async function loadOverview() {
  try {
    const data = await api('/financials');
    const cards = [
      ['Total players', data.totalPlayers],
      ['Rounds completed', data.roundsCompleted],
      ['Commission earned', data.commissionEarned],
      ['Pending withdrawals', data.pendingWithdrawals],
      ['Deposits', data.totals.deposits],
      ['Withdrawals', data.totals.withdrawals],
      ['Bets placed', data.totals.bets],
      ['Payouts', data.totals.payouts],
      ['Bonuses granted', data.totals.bonuses],
    ];
    document.getElementById('statCards').innerHTML = cards
      .map(([label, value]) => `<div class="stat-card"><div class="label">${label}</div><div class="value">${value ?? 0}</div></div>`)
      .join('');

    const badge = document.getElementById('pendingBadge');
    if (data.pendingWithdrawals > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = data.pendingWithdrawals;
    } else {
      badge.style.display = 'none';
    }

    const tbody = document.querySelector('#recentWinnersTable tbody');
    tbody.innerHTML = data.recentWinners.length
      ? data.recentWinners
          .map(
            (w) => `<tr>
              <td>${w.username || w.firstname || 'Player #' + w.player_id}</td>
              <td>#${w.room_id}</td>
              <td>${w.pattern}</td>
              <td>${w.amount}</td>
              <td>${w.commission}</td>
              <td>${new Date(w.created_at).toLocaleString()}</td>
            </tr>`
          )
          .join('')
      : '<tr><td colspan="6" class="empty">No rounds completed yet</td></tr>';
  } catch (e) {
    if (e.message.includes('token')) { showLogin(); return; }
    console.error(e);
  }
}

/* ---------------- Rooms ---------------- */

async function loadRooms() {
  const { rooms } = await api('/rooms');
  const tbody = document.querySelector('#roomsTable tbody');
  tbody.innerHTML = rooms.length
    ? rooms.map(roomRow).join('')
    : '<tr><td colspan="7" class="empty">No rooms yet — create one</td></tr>';

  tbody.querySelectorAll('[data-action]').forEach((btn) => {
    btn.onclick = () => handleRoomAction(btn.dataset.action, Number(btn.dataset.id));
  });
}

function roomRow(r) {
  const canStart = r.status === 'WAITING' || r.status === 'STARTING';
  const canCancel = r.status !== 'FINISHED';
  return `<tr>
    <td>#${r.id}</td>
    <td><span class="badge ${r.status}">${r.status}</span></td>
    <td>${r.entry_fee}</td>
    <td>${r.current_players}/${r.max_players}</td>
    <td>${r.prize_pool}</td>
    <td>${r.game_speed_ms}ms</td>
    <td class="row-actions">
      ${canStart ? `<button class="success" data-action="start" data-id="${r.id}">Force start</button>` : ''}
      ${canCancel ? `<button class="danger" data-action="cancel" data-id="${r.id}">Cancel + refund</button>` : ''}
    </td>
  </tr>`;
}

async function handleRoomAction(action, id) {
  try {
    if (action === 'start') await api(`/rooms/${id}/start`, { method: 'POST' });
    if (action === 'cancel') {
      if (!confirm('Cancel this room and refund every paid player?')) return;
      await api(`/rooms/${id}/cancel`, { method: 'POST' });
    }
    loadRooms();
  } catch (e) {
    alert(e.message);
  }
}

document.getElementById('refreshRoomsBtn').onclick = loadRooms;
document.getElementById('newRoomBtn').onclick = () => document.getElementById('newRoomModal').classList.add('active');
document.getElementById('nrCancel').onclick = () => document.getElementById('newRoomModal').classList.remove('active');
document.getElementById('nrCreate').onclick = async () => {
  try {
    await api('/rooms', {
      method: 'POST',
      body: JSON.stringify({
        entryFee: Number(document.getElementById('nrEntryFee').value),
        maxPlayers: Number(document.getElementById('nrMaxPlayers').value),
        gameSpeedMs: Number(document.getElementById('nrSpeed').value),
        autoStart: document.getElementById('nrAutoStart').checked,
      }),
    });
    document.getElementById('newRoomModal').classList.remove('active');
    loadRooms();
  } catch (e) {
    alert(e.message);
  }
};

/* ---------------- Players ---------------- */

async function loadPlayers() {
  const search = document.getElementById('playerSearch').value.trim();
  const { players } = await api('/players' + (search ? `?search=${encodeURIComponent(search)}` : ''));
  const tbody = document.querySelector('#playersTable tbody');
  tbody.innerHTML = players.length
    ? players.map(playerRow).join('')
    : '<tr><td colspan="6" class="empty">No players found</td></tr>';

  tbody.querySelectorAll('[data-action]').forEach((btn) => {
    btn.onclick = () => handlePlayerAction(btn.dataset.action, Number(btn.dataset.id), btn.dataset.name);
  });
}

function playerRow(p) {
  return `<tr>
    <td>#${p.id}</td>
    <td>${p.username || p.firstname || '—'}</td>
    <td>${p.balance}</td>
    <td>${p.wins}/${p.losses}</td>
    <td><span class="badge ${p.status}">${p.status}</span></td>
    <td class="row-actions">
      <button data-action="adjust" data-id="${p.id}" data-name="${p.username || p.firstname || ('#' + p.id)}">Adjust</button>
      ${p.status === 'active'
        ? `<button class="danger" data-action="ban" data-id="${p.id}">Ban</button>`
        : `<button class="success" data-action="unban" data-id="${p.id}">Unban</button>`}
    </td>
  </tr>`;
}

let adjustTargetId = null;

async function handlePlayerAction(action, id, name) {
  if (action === 'adjust') {
    adjustTargetId = id;
    document.getElementById('adjustPlayerLabel').textContent = name;
    document.getElementById('adjAmount').value = 0;
    document.getElementById('adjReason').value = '';
    document.getElementById('adjustModal').classList.add('active');
    return;
  }
  try {
    if (action === 'ban') {
      if (!confirm('Ban this player? They will keep their balance but should be blocked from new logins by your bot/gateway layer.')) return;
      await api(`/players/${id}/ban`, { method: 'POST' });
    }
    if (action === 'unban') await api(`/players/${id}/unban`, { method: 'POST' });
    loadPlayers();
  } catch (e) {
    alert(e.message);
  }
}

document.getElementById('playerSearchBtn').onclick = loadPlayers;
document.getElementById('playerSearch').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadPlayers(); });

document.getElementById('adjCancel').onclick = () => document.getElementById('adjustModal').classList.remove('active');
document.getElementById('adjConfirm').onclick = async () => {
  const amount = Number(document.getElementById('adjAmount').value);
  const reason = document.getElementById('adjReason').value;
  if (!amount) { alert('Amount must be non-zero'); return; }
  try {
    await api(`/players/${adjustTargetId}/adjust`, { method: 'POST', body: JSON.stringify({ amount, reason }) });
    document.getElementById('adjustModal').classList.remove('active');
    loadPlayers();
  } catch (e) {
    alert(e.message);
  }
};

/* ---------------- Withdrawals ---------------- */

async function loadWithdrawals() {
  const status = document.getElementById('withdrawalStatusFilter').value;
  const { requests } = await api(`/withdrawals?status=${status}`);
  const tbody = document.querySelector('#withdrawalsTable tbody');
  tbody.innerHTML = requests.length
    ? requests.map(withdrawalRow).join('')
    : '<tr><td colspan="6" class="empty">No withdrawal requests</td></tr>';

  tbody.querySelectorAll('[data-action]').forEach((btn) => {
    btn.onclick = () => handleWithdrawalAction(btn.dataset.action, Number(btn.dataset.id));
  });
}

function withdrawalRow(w) {
  const isPending = w.status === 'PENDING';
  return `<tr>
    <td>#${w.id}</td>
    <td>${w.username || w.firstname || 'Player #' + w.player_id}</td>
    <td>${w.amount}</td>
    <td><span class="badge ${w.status}">${w.status}</span>${w.reason && w.status === 'REJECTED' ? ` <span style="color:var(--text-dim); font-size:11px;">(${w.reason})</span>` : ''}</td>
    <td>${new Date(w.created_at).toLocaleString()}</td>
    <td class="row-actions">
      ${isPending
        ? `<button class="success" data-action="approve" data-id="${w.id}">Approve</button>
           <button class="danger" data-action="reject" data-id="${w.id}">Reject</button>`
        : '—'}
    </td>
  </tr>`;
}

let rejectTargetId = null;

async function handleWithdrawalAction(action, id) {
  if (action === 'approve') {
    if (!confirm('Approve this withdrawal? This confirms the payment was sent outside the app (e.g. bank transfer / mobile money) — it does not send money itself.')) return;
    try {
      await api(`/withdrawals/${id}/approve`, { method: 'POST' });
      loadWithdrawals();
      loadOverview();
    } catch (e) {
      alert(e.message);
    }
    return;
  }
  if (action === 'reject') {
    rejectTargetId = id;
    document.getElementById('rejectReason').value = '';
    document.getElementById('rejectModal').classList.add('active');
  }
}

document.getElementById('refreshWithdrawalsBtn').onclick = loadWithdrawals;
document.getElementById('withdrawalStatusFilter').onchange = loadWithdrawals;
document.getElementById('rejectCancel').onclick = () => document.getElementById('rejectModal').classList.remove('active');
document.getElementById('rejectConfirm').onclick = async () => {
  const reason = document.getElementById('rejectReason').value;
  try {
    await api(`/withdrawals/${rejectTargetId}/reject`, { method: 'POST', body: JSON.stringify({ reason }) });
    document.getElementById('rejectModal').classList.remove('active');
    loadWithdrawals();
    loadOverview();
  } catch (e) {
    alert(e.message);
  }
};

/* ---------------- Boot ---------------- */

if (token) {
  api('/financials').then(showDashboard).catch(showLogin);
} else {
  showLogin();
}
</script>
</body>
</html>
